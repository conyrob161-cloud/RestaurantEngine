<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Meshy Model Tester</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud { position: fixed; inset: 0; pointer-events: none; display: flex; align-items: flex-start; justify-content: space-between; padding: 14px; box-sizing: border-box; }
    .card { pointer-events: auto; background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 12px 14px; box-shadow: 0 14px 40px rgba(0,0,0,0.25); max-width: min(460px, calc(100vw - 28px)); }
    .title { font-weight: 800; font-size: 18px; margin-bottom: 6px; }
    .small { opacity: 0.85; font-size: 13px; line-height: 1.45; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button { pointer-events: auto; appearance: none; border: 0; border-radius: 999px; padding: 10px 14px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
    button.secondary { background: rgba(255,255,255,0.10); }
    .status { position: fixed; left: 14px; right: 14px; bottom: 14px; background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 10px 12px; box-sizing: border-box; font-size: 13px; line-height: 1.4; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .err { color: #fca5a5; }
    .ok { color: #86efac; }
  </style>
</head>
<body>
  <div class="hud">
    <div class="card">
      <div class="title">Meshy GLB tester</div>
      <div class="small">Levý drag = otáčení. Kolečko / pinch = zoom. Pravý drag / dva prsty = posun kamery.</div>
      <div class="row">
        <button id="resetBtn">Reset kamery</button>
        <button id="toggleAnimBtn" class="secondary">Animace: zap.</button>
      </div>
    </div>
  </div>
  <div class="status" id="status">Načítám model…</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');
    const toggleAnimBtn = document.getElementById('toggleAnimBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.Fog(0x0f172a, 8, 30);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(2.5, 1.8, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 1, 0);
    controls.minDistance = 0.5;
    controls.maxDistance = 20;
    controls.enablePan = true;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x22324d, 1.5));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(3, 5, 4);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffd8ad, 0.8);
    fillLight.position.set(-4, 2, -3);
    scene.add(fillLight);

    const ground = new THREE.Mesh(new THREE.CircleGeometry(8, 48), new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 1, metalness: 0 }));
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.001;
    scene.add(ground);
    const grid = new THREE.GridHelper(16, 16, 0x31415e, 0x263244);
    grid.position.y = 0.001;
    scene.add(grid);

    const loader = new GLTFLoader();
    const mixerClock = new THREE.Clock();
    let mixer = null;
    let modelRoot = null;
    let animEnabled = true;
    let baseBox = null;

    function setStatus(msg, cls = '') {
      statusEl.className = 'status';
      if (cls) statusEl.classList.add(cls);
      statusEl.textContent = msg;
    }

    function frameModel(object3d) {
      const box = new THREE.Box3().setFromObject(object3d);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 0.001);
      const scale = 2.0 / maxDim;
      object3d.scale.setScalar(scale);
      object3d.position.sub(center);
      object3d.position.multiplyScalar(scale);
      object3d.position.y -= new THREE.Box3().setFromObject(object3d).min.y;
      baseBox = new THREE.Box3().setFromObject(object3d);
      const finalCenter = baseBox.getCenter(new THREE.Vector3());
      controls.target.set(finalCenter.x, Math.max(0.8, baseBox.min.y + (baseBox.max.y - baseBox.min.y) * 0.45), finalCenter.z);
      camera.position.set(finalCenter.x + 2.5, finalCenter.y + 1.6, finalCenter.z + 3.5);
      controls.update();
    }

    function clearModel() {
      if (!modelRoot) return;
      scene.remove(modelRoot);
      modelRoot.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.geometry?.dispose?.();
        if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose?.());
        else obj.material?.dispose?.();
      });
      modelRoot = null;
      mixer = null;
    }

    function loadModel() {
      clearModel();
      setStatus('Načítám model Meshy_AI_Meshy_Merged_Animations.glb…');
      loader.load(
        'Meshy_AI_Meshy_Merged_Animations.glb',
        (gltf) => {
          modelRoot = gltf.scene;
          modelRoot.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });
          scene.add(modelRoot);
          frameModel(modelRoot);
          if (Array.isArray(gltf.animations) && gltf.animations.length) {
            mixer = new THREE.AnimationMixer(modelRoot);
            const clip = gltf.animations.find((a) => /idle/i.test(a.name || '')) || gltf.animations[0];
            mixer.clipAction(clip).play();
            setStatus(`Model načten. Animace: ${clip.name || 'první dostupná'}`, 'ok');
          } else {
            setStatus('Model načten. Soubor neobsahuje animace.', 'ok');
          }
        },
        undefined,
        (err) => {
          console.error(err);
          setStatus('Nepodařilo se načíst model. Zkontroluj název souboru a jestli je v rootu repozitáře.', 'err');
        }
      );
    }

    resetBtn.addEventListener('click', () => {
      if (!baseBox) return;
      const center = baseBox.getCenter(new THREE.Vector3());
      controls.target.copy(center);
      camera.position.set(center.x + 2.5, center.y + 1.6, center.z + 3.5);
      controls.update();
    });

    toggleAnimBtn.addEventListener('click', () => {
      animEnabled = !animEnabled;
      toggleAnimBtn.textContent = `Animace: ${animEnabled ? 'zap.' : 'vyp.'}`;
      setStatus(animEnabled ? 'Animace zapnuty.' : 'Animace vypnuty.', animEnabled ? 'ok' : '');
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    loadModel();
    function animate() {
      requestAnimationFrame(animate);
      const dt = mixerClock.getDelta();
      if (mixer && animEnabled) mixer.update(dt);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
