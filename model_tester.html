<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Meshy Model Tester</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud { position: fixed; inset: 0; pointer-events: none; display: flex; align-items: flex-start; justify-content: space-between; padding: 14px; box-sizing: border-box; }
    .card { pointer-events: auto; background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 12px 14px; box-shadow: 0 14px 40px rgba(0,0,0,0.25); max-width: min(460px, calc(100vw - 28px)); }
    .title { font-weight: 800; font-size: 18px; margin-bottom: 6px; }
    .small { opacity: 0.85; font-size: 13px; line-height: 1.45; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button { pointer-events: auto; appearance: none; border: 0; border-radius: 999px; padding: 10px 14px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
    button.secondary { background: rgba(255,255,255,0.10); }
    .status { position: fixed; left: 14px; right: 14px; bottom: 14px; background: rgba(15, 23, 42, 0.78); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 10px 12px; box-sizing: border-box; font-size: 13px; line-height: 1.45; }
    .ok { color: #86efac; }
    .err { color: #fca5a5; }
    pre { margin: 8px 0 0; white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.35; max-height: 36vh; overflow: auto; }
  </style>
</head>
<body>
  <div class="hud">
    <div class="card">
      <div class="title">Meshy GLB tester</div>
      <div class="small">Levý drag = otáčení. Kolečko / pinch = zoom. Pravý drag / dva prsty = posun kamery.</div>
      <div class="row">
        <button id="resetBtn">Reset kamery</button>
        <button id="toggleAnimBtn" class="secondary">Animace: zap.</button>
      </div>
    </div>
  </div>
  <div class="status" id="statusBox"><div id="statusText">Startuji diagnostiku…</div><pre id="log"></pre></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const statusText = document.getElementById('statusText');
    const logEl = document.getElementById('log');
    const resetBtn = document.getElementById('resetBtn');
    const toggleAnimBtn = document.getElementById('toggleAnimBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.Fog(0x0f172a, 8, 30);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(2.5, 1.8, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 1, 0);
    controls.minDistance = 0.5;
    controls.maxDistance = 20;
    controls.enablePan = true;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x22324d, 1.5));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(3, 5, 4);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffd8ad, 0.8);
    fillLight.position.set(-4, 2, -3);
    scene.add(fillLight);

    const ground = new THREE.Mesh(new THREE.CircleGeometry(8, 48), new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 1, metalness: 0 }));
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.001;
    scene.add(ground);
    scene.add(new THREE.GridHelper(16, 16, 0x31415e, 0x263244));

    const loader = new GLTFLoader();
    const clock = new THREE.Clock();
    let mixer = null;
    let modelRoot = null;
    let baseBox = null;
    let animEnabled = true;

    const URLS = [
      new URL('./Meshy_AI_Meshy_Merged_Animations.glb', window.location.href).href,
      new URL('Meshy_AI_Meshy_Merged_Animations.glb', window.location.href).href,
      `${window.location.origin}/RestaurantEngine/Meshy_AI_Meshy_Merged_Animations.glb`,
      `${window.location.origin}/RestaurantEngine/docs/Meshy_AI_Meshy_Merged_Animations.glb`,
    ];

    function setStatus(text, ok = null) {
      statusText.textContent = text;
      statusText.className = ok === true ? 'ok' : ok === false ? 'err' : '';
    }

    function setLog(lines) {
      logEl.textContent = lines.join('\n');
    }

    function addLog(line) {
      logEl.textContent += (logEl.textContent ? '\n' : '') + line;
    }

    function disposeModel(root) {
      if (!root) return;
      root.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.geometry?.dispose?.();
        if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose?.());
        else obj.material?.dispose?.();
      });
    }

    function clearModel() {
      if (modelRoot) scene.remove(modelRoot);
      disposeModel(modelRoot);
      modelRoot = null;
      mixer = null;
    }

    function frameModel(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const scale = 2.0 / Math.max(size.x, size.y, size.z, 0.001);
      obj.scale.setScalar(scale);
      obj.position.sub(center).multiplyScalar(scale);
      obj.position.y -= new THREE.Box3().setFromObject(obj).min.y;
      baseBox = new THREE.Box3().setFromObject(obj);
      const c = baseBox.getCenter(new THREE.Vector3());
      controls.target.set(c.x, Math.max(0.8, baseBox.min.y + (baseBox.max.y - baseBox.min.y) * 0.45), c.z);
      camera.position.set(c.x + 2.5, c.y + 1.6, c.z + 3.5);
      controls.update();
    }

    async function fetchAsArrayBuffer(url) {
      setStatus(`Fetch: ${url}`);
      addLog(`→ ${url}`);
      const res = await fetch(url, { cache: 'no-store' });
      addLog(`  HTTP ${res.status} ${res.statusText || ''}`.trim());
      addLog(`  content-type: ${res.headers.get('content-type') || '(none)'}`);
      addLog(`  content-length: ${res.headers.get('content-length') || '(none)'}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const buf = await res.arrayBuffer();
      addLog(`  bytes: ${buf.byteLength}`);
      return buf;
    }

    function loadUrl(index = 0) {
      if (index >= URLS.length) {
        setStatus('Všechny cesty selhaly.', false);
        addLog('Všechny cesty selhaly.');
        return;
      }
      const url = URLS[index];
      fetchAsArrayBuffer(url)
        .then((buffer) => {
          addLog('  parse: start');
          loader.parse(buffer, new URL('.', url).href, (gltf) => {
            addLog('  parse: ok');
            clearModel();
            modelRoot = gltf.scene;
            modelRoot.name = 'meshy-root';
            let meshCount = 0;
            let skinnedCount = 0;
            let boneCount = 0;
            let nodeCount = 0;
            modelRoot.traverse((obj) => {
              nodeCount += 1;
              if (obj.isMesh) {
                meshCount += 1;
                obj.castShadow = true;
                obj.receiveShadow = true;
              }
              if (obj.isSkinnedMesh) skinnedCount += 1;
              if (obj.isBone) boneCount += 1;
            });
            scene.add(modelRoot);
            frameModel(modelRoot);
            addLog(`  nodes: ${nodeCount}`);
            addLog(`  meshes: ${meshCount}`);
            addLog(`  skinned meshes: ${skinnedCount}`);
            addLog(`  bones: ${boneCount}`);
            addLog(`  animations: ${(gltf.animations || []).length}`);
            if (gltf.animations?.length) {
              mixer = new THREE.AnimationMixer(modelRoot);
              const clip = gltf.animations.find((a) => /idle/i.test(a.name || '')) || gltf.animations[0];
              mixer.clipAction(clip).play();
              addLog(`  clip: ${clip.name || '(unnamed)'}`);
            }
            setStatus(`Načteno z ${url}`, true);
          }, (err) => {
            addLog(`  parse error: ${err?.message || err}`);
            setStatus(`Parse selhal u ${url}`, false);
            loadUrl(index + 1);
          });
        })
        .catch((err) => {
          addLog(`  fetch error: ${err?.message || err}`);
          loadUrl(index + 1);
        });
    }

    resetBtn.addEventListener('click', () => {
      if (!baseBox) return;
      const center = baseBox.getCenter(new THREE.Vector3());
      controls.target.copy(center);
      camera.position.set(center.x + 2.5, center.y + 1.6, center.z + 3.5);
      controls.update();
    });

    toggleAnimBtn.addEventListener('click', () => {
      animEnabled = !animEnabled;
      toggleAnimBtn.textContent = `Animace: ${animEnabled ? 'zap.' : 'vyp.'}`;
      addLog(`Animace ${animEnabled ? 'zapnuta' : 'vypnuta'}.`);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setLog(['Čekám na výsledek diagnostiky…']);
    loadUrl(0);

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (mixer && animEnabled) mixer.update(dt);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
