<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#10131a" />
  <title>Restaurant Zombie</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
  <div id="app">
    <canvas id="game" aria-label="3D game canvas"></canvas>

    <div class="hud">
      <div class="panel">
        <div class="panel-title">Restaurant Zombie</div>
        <div class="stats">
          <div><span>Peníze</span><strong id="money">0</strong></div>
          <div><span>Suroviny</span><strong id="stock">0</strong></div>
          <div><span>Neseno</span><strong id="carry">0</strong></div>
          <div><span>V peci</span><strong id="oven">0</strong></div>
          <div><span>Čeká</span><strong id="waiting">0</strong></div>
          <div><span>Reputace</span><strong id="rep">0</strong></div>
        </div>
      </div>
    </div>

    <div class="top-actions">
      <button id="spawnBtn">Přivolat hosta</button>
      <button id="buyStockBtn">Suroviny (5)</button>
      <button id="upgradeCarryBtn" class="secondary">Kapacita</button>
      <button id="upgradeOvenBtn" class="secondary">Pec</button>
      <button id="saveBtn" class="ghost">Uložit</button>
      <button id="resetBtn" class="ghost">Reset</button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="footer">
      <div class="help">
        Ovládání: WASD / šipky nebo plovoucí joystick vlevo. E / tlačítko vpravo = interakce.
        Zbylé pizzy na stolech zůstávají pro další hosty.
      </div>
      <button id="actionBtn" class="action">E</button>
    </div>

    <div class="mobile-controls">
      <div class="stick" id="stick"><div class="nub" id="nub"></div></div>
    </div>
  </div>
  <script src="main_v5.js?v=6"></script>
</body>
</html>
